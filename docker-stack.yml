version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# muvbot-frontend – Docker Swarm Stack
# Deploy: docker stack deploy -c docker-stack.yml muvbot-frontend --with-registry-auth
# ─────────────────────────────────────────────────────────────────────────────

services:
  frontend:
    image: ${IMAGE_TAG:-ghcr.io/muv1n1/muvbotfrontend:latest}
    ports:
      - "4321:4321"
    networks:
      - mynet
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        max_failure_ratio: 0.3
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 5s
        monitor: 30s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    # Health Check temporär deaktiviert für Deployment-Tests
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -qO- http://localhost:4321/ || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5
    #   start_period: 60s

networks:
  mynet:
    external: true
