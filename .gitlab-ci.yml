stages:
  - build
  - test
  - docker
  - deploy
  - cleanup

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_TAG_LATEST: $CI_REGISTRY_IMAGE:latest
  APP_NAME: muvbot-frontend
  STACK_NAME: muvbot-frontend
  APP_PORT: "4321"

# ─────────────────────────────────────────────────────────────────────────────
# REUSABLE ANCHORS
# ─────────────────────────────────────────────────────────────────────────────
.only_main: &only_main
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $CI_COMMIT_BRANCH == "main"

.docker_login: &docker_login
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

.ssh_setup: &ssh_setup
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: build  (Astro SSR → dist/)
# ─────────────────────────────────────────────────────────────────────────────
build:
  stage: build
  image: node:20-alpine
  <<: *only_main
  script:
    - npm install
    - npm run build
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_SHORT_SHA"
    paths:
      - dist/
    expire_in: 1 hour

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: test
# Startet Astro preview (gegen dist/ aus dem build-Job) und führt Playwright aus.
# Läuft NACH build aber VOR docker → kein Docker Image nötig.
# ─────────────────────────────────────────────────────────────────────────────
playwright:
  stage: test
  image: mcr.microsoft.com/playwright:v1.52.0-noble
  <<: *only_main
  dependencies:
    - build              # dist/-Artifact aus dem build-Job
  variables:
    # PUBLIC_* Variablen werden hier als echte Env-Variablen gesetzt,
    # damit der Astro-Preview-Server sie kennt (SSR liest sie zur Laufzeit)
    PUBLIC_API_URL: $PUBLIC_API_URL
    PUBLIC_SITE_ORIGIN: $PUBLIC_SITE_ORIGIN
    PUBLIC_DISCORD_CLIENT_ID: $PUBLIC_DISCORD_CLIENT_ID
  before_script:
    - npm install --prefer-offline
  script:
    # Astro preview-Server im Hintergrund starten (nutzt dist/ aus dem Artifact)
    - npm run preview -- --port 4321 --host 127.0.0.1 &
    - PREVIEW_PID=$!
    # Warten bis der Server antwortet (max 30s)
    - |
      for i in $(seq 1 30); do
        sleep 1
        curl -sf http://127.0.0.1:4321/ > /dev/null 2>&1 && break
        echo "Waiting for preview server... ($i/30)"
      done
    # Playwright mit der CI-Config ausführen
    - npx playwright test --config=playwright.config.ci.ts
    # Preview-Server sauber beenden
    - kill $PREVIEW_PID 2>/dev/null || true
  artifacts:
    when: always
    reports:
      junit: test-results/junit.xml    # GitLab zeigt Testergebnisse nativ an
    paths:
      - test-results/                  # Screenshots bei Fehlern
    expire_in: 7 days

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: docker
# Baut das Image mit buildx (BuildKit) und pusht es in die GitLab Registry.
# buildx ist schneller, unterstützt Cache-Export und ist der moderne Standard.
# ─────────────────────────────────────────────────────────────────────────────
docker-build:
  stage: docker
  image: docker:26
  services:
    - docker:26-dind
  <<: *docker_login
  <<: *only_main
  script:
    - docker context create myctx
    - docker buildx create --name ci-builder --driver docker-container --use myctx
    - |
      docker buildx build \
        --push \
        --platform linux/amd64 \
        --cache-from type=registry,ref="$IMAGE_TAG_LATEST" \
        --cache-to   type=inline \
        --build-arg PUBLIC_API_URL="$PUBLIC_API_URL" \
        --build-arg PUBLIC_SITE_ORIGIN="$PUBLIC_SITE_ORIGIN" \
        --build-arg PUBLIC_DISCORD_CLIENT_ID="$PUBLIC_DISCORD_CLIENT_ID" \
        -t "$IMAGE_TAG" \
        -t "$IMAGE_TAG_LATEST" \
        .

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: deploy
# Kopiert docker-stack.yml auf den Server und führt docker stack deploy aus.
# docker stack deploy zieht das neue Image und macht ein Rolling Update.
# ─────────────────────────────────────────────────────────────────────────────
deploy:
  stage: deploy
  image: alpine:3.19
  <<: *only_main
  <<: *ssh_setup
  script:
    # docker-stack.yml auf den Server kopieren
    - scp docker-stack.yml "$SERVER_USER@$SERVER_IP:/opt/stacks/frontend/docker-stack.yml"
    - |
      ssh "$SERVER_USER@$SERVER_IP" /bin/bash << REMOTE
        set -e

        # Registry-Login damit der Swarm-Manager das Image pullen kann
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" \
          --password-stdin "$CI_REGISTRY" 2>/dev/null || true

        # Stack deployen (erstellt oder updated den Service automatisch)
        IMAGE_TAG="$IMAGE_TAG" \
          docker stack deploy \
            -c /opt/stacks/frontend/docker-stack.yml \
            "$STACK_NAME" \
            --with-registry-auth \
            --prune

        # Warten bis der Rolling Update abgeschlossen ist
        echo "Waiting for service update to complete..."
        docker service update --force --update-order start-first "$STACK_NAME"_frontend 2>/dev/null || true
        docker service ls --filter "name=$STACK_NAME"

        # Health-Check: Service muss RUNNING sein
        echo "Checking service health (max 60s)..."
        HEALTHY=false
        for i in \$(seq 1 12); do
          sleep 5
          RUNNING=\$(docker service ps "$STACK_NAME"_frontend \
            --filter "desired-state=running" \
            --format "{{.CurrentState}}" 2>/dev/null | head -1)
          echo "  Attempt \$i/12 — State: \$RUNNING"
          if echo "\$RUNNING" | grep -qi "running"; then
            HEALTHY=true
            break
          fi
        done

        if [ "\$HEALTHY" = "false" ]; then
          echo "Service health check FAILED!"
          docker service ps "$STACK_NAME"_frontend --no-trunc
          exit 1
        fi

        echo "Deploy successful! $STACK_NAME is running."
      REMOTE
  environment:
    name: production
    url: http://$SERVER_IP:$APP_PORT

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: cleanup
# ─────────────────────────────────────────────────────────────────────────────
cleanup:
  stage: cleanup
  image: alpine:3.19
  <<: *only_main
  <<: *ssh_setup
  when: always
  script:
    - |
      ssh "$SERVER_USER@$SERVER_IP" /bin/bash << REMOTE
        echo "Pruning unused Docker images..."
        docker image prune -f
        echo "Cleanup done"
      REMOTE
