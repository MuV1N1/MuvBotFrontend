name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  APP_NAME: muvbot-frontend
  STACK_NAME: muvbot-frontend
  APP_PORT: 4321

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=ghcr.io/${{ github.repository }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker buildx build \
            --push \
            --platform linux/amd64 \
            --no-cache \
            --build-arg PUBLIC_API_URL="${{ secrets.PUBLIC_API_URL }}" \
            --build-arg PUBLIC_SITE_ORIGIN="${{ secrets.PUBLIC_SITE_ORIGIN }}" \
            --build-arg PUBLIC_DISCORD_CLIENT_ID="${{ secrets.PUBLIC_DISCORD_CLIENT_ID }}" \
            -t ghcr.io/${{ github.repository }}:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}:latest \
            .

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Copy stack file
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "mkdir -p /opt/stacks/frontend"

          scp docker-stack.yml \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/opt/stacks/frontend/docker-stack.yml

      - name: Deploy Stack
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            set -e

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.actor }}" \
              --password-stdin

            IMAGE_TAG="ghcr.io/${{ github.repository }}:${{ github.sha }}"

            docker stack deploy \
              -c /opt/stacks/frontend/docker-stack.yml \
              ${{ env.STACK_NAME }} \
              --with-registry-auth \
              --prune

            docker service update --force ${{ env.STACK_NAME }}_frontend

            docker service ls --filter "name=${{ env.STACK_NAME }}"

            echo "Deploy successful!"
          EOF

  cleanup:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Cleanup Docker Images
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "docker image prune -f"